<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сайт скоро появится — ТЦСОН Гомеля</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffffff,#f5fff7,#fff5f5);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}
.container{
  text-align:center;
  max-width:700px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  animation:fadeIn 1.2s ease;
}
h1{
  font-size:36px;
  margin-bottom:20px;
  background: linear-gradient(90deg,#c62828,#1b8f4d);
  -webkit-background-clip:text;
  color:transparent;
}
p{
  font-size:18px;
  color:#555;
}
.loader{
  margin-top:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:6px solid rgba(0,0,0,0.1);
  border-top:6px solid #c62828;
  border-right:6px solid #1b8f4d;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
<div class="container">
  <h1>Сайт скоро появится</h1>
  <p>
    Территориальный центр социального обслуживания населения<br>
    Железнодорожного района города Гомеля
  </p>
  <div class="loader"></div>
</div>
</body>
</html>
